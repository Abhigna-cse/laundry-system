<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🧺 Laundry Order Management System</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #333; }

  /* NAV */
  nav {
    background: linear-gradient(135deg, #1a73e8, #0d47a1);
    color: white; padding: 16px 32px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  nav h1 { font-size: 22px; }
  .nav-tabs { display: flex; gap: 8px; }
  .nav-tabs button {
    background: rgba(255,255,255,0.15); border: none; color: white;
    padding: 8px 18px; border-radius: 20px; cursor: pointer; font-size: 14px;
    transition: background 0.2s;
  }
  .nav-tabs button:hover, .nav-tabs button.active { background: rgba(255,255,255,0.35); }

  /* LAYOUT */
  .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
  .section { display: none; }
  .section.active { display: block; }

  /* CARDS */
  .card {
    background: white; border-radius: 12px; padding: 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 20px;
  }
  .card h2 { font-size: 18px; margin-bottom: 18px; color: #1a73e8; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px; }

  /* DASHBOARD STATS */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 16px; margin-bottom: 20px; }
  .stat-card {
    background: white; border-radius: 12px; padding: 20px; text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .stat-card .value { font-size: 32px; font-weight: 700; color: #1a73e8; }
  .stat-card .label { font-size: 13px; color: #666; margin-top: 4px; }

  /* FORM */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 13px; font-weight: 600; color: #555; }
  input, select {
    padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 8px;
    font-size: 14px; transition: border 0.2s;
  }
  input:focus, select:focus { outline: none; border-color: #1a73e8; }

  /* GARMENT TABLE */
  .garment-row {
    display: grid; grid-template-columns: 2fr 1fr 1fr auto;
    gap: 10px; align-items: center; margin-bottom: 10px;
  }
  .garment-row input, .garment-row select { margin: 0; }

  /* BUTTONS */
  .btn {
    padding: 10px 22px; border: none; border-radius: 8px;
    cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s;
  }
  .btn-primary { background: #1a73e8; color: white; }
  .btn-primary:hover { background: #1558b0; }
  .btn-success { background: #34a853; color: white; }
  .btn-success:hover { background: #2d8f47; }
  .btn-danger  { background: #ea4335; color: white; }
  .btn-danger:hover  { background: #c62828; }
  .btn-sm { padding: 6px 14px; font-size: 12px; }
  .btn-outline { background: white; color: #1a73e8; border: 2px solid #1a73e8; }

  /* STATUS BADGE */
  .badge {
    display: inline-block; padding: 4px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 700;
  }
  .badge-RECEIVED   { background: #fff3e0; color: #e65100; }
  .badge-PROCESSING { background: #e3f2fd; color: #0d47a1; }
  .badge-READY      { background: #e8f5e9; color: #1b5e20; }
  .badge-DELIVERED  { background: #f3e5f5; color: #4a148c; }

  /* ORDER TABLE */
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { background: #f8f9fa; padding: 12px; text-align: left; font-size: 13px; color: #555; }
  td { padding: 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
  tr:hover td { background: #f8f9fa; }

  /* FILTER BAR */
  .filter-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
  .filter-bar input, .filter-bar select { flex: 1; min-width: 160px; }

  /* ALERT */
  .alert {
    padding: 14px 18px; border-radius: 8px; margin-bottom: 16px;
    font-size: 14px; display: none;
  }
  .alert-success { background: #e8f5e9; color: #1b5e20; border-left: 4px solid #34a853; }
  .alert-error   { background: #ffebee; color: #b71c1c; border-left: 4px solid #ea4335; }

  /* PRICE LIST */
  .price-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 10px; }
  .price-item {
    background: #f8f9fa; border-radius: 8px; padding: 12px; text-align: center;
    font-size: 13px;
  }
  .price-item .pname { font-weight: 600; text-transform: capitalize; }
  .price-item .pprice { color: #1a73e8; font-weight: 700; font-size: 16px; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white; border-radius: 16px; padding: 28px;
    width: 90%; max-width: 500px; box-shadow: 0 8px 40px rgba(0,0,0,0.2);
  }
  .modal h3 { margin-bottom: 16px; color: #1a73e8; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  .add-garment-btn { color: #1a73e8; background: none; border: 2px dashed #1a73e8; border-radius: 8px; padding: 8px 16px; cursor: pointer; width: 100%; margin-bottom: 16px; font-size: 13px; }
  .add-garment-btn:hover { background: #e8f0fe; }

  @media(max-width:600px){
    .form-row { grid-template-columns: 1fr; }
    .garment-row { grid-template-columns: 1fr 1fr; }
    nav h1 { font-size: 16px; }
  }
</style>
</head>
<body>

<nav>
  <h1>🧺 LaundryPro</h1>
  <div class="nav-tabs">
    <button class="active" onclick="showSection('dashboard')">📊 Dashboard</button>
    <button onclick="showSection('create')">➕ New Order</button>
    <button onclick="showSection('orders')">📋 Orders</button>
  </div>
</nav>

<div class="container">

  <!-- ── DASHBOARD ── -->
  <div id="dashboard" class="section active">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="value" id="stat-total">0</div>
        <div class="label">Total Orders</div>
      </div>
      <div class="stat-card">
        <div class="value" id="stat-revenue">₹0</div>
        <div class="label">Total Revenue</div>
      </div>
      <div class="stat-card">
        <div class="value" id="stat-received" style="color:#e65100">0</div>
        <div class="label">Received</div>
      </div>
      <div class="stat-card">
        <div class="value" id="stat-processing" style="color:#0d47a1">0</div>
        <div class="label">Processing</div>
      </div>
      <div class="stat-card">
        <div class="value" id="stat-ready" style="color:#1b5e20">0</div>
        <div class="label">Ready</div>
      </div>
      <div class="stat-card">
        <div class="value" id="stat-delivered" style="color:#4a148c">0</div>
        <div class="label">Delivered</div>
      </div>
    </div>

    <div class="card">
      <h2>💰 Price List</h2>
      <div class="price-grid" id="price-list"></div>
    </div>
  </div>

  <!-- ── CREATE ORDER ── -->
  <div id="create" class="section">
    <div class="card">
      <h2>➕ Create New Order</h2>
      <div id="create-alert" class="alert"></div>

      <div class="form-row">
        <div class="form-group">
          <label>Customer Name *</label>
          <input type="text" id="c-name" placeholder="Enter customer name"/>
        </div>
        <div class="form-group">
          <label>Phone Number *</label>
          <input type="text" id="c-phone" placeholder="Enter phone number"/>
        </div>
      </div>

      <label style="font-size:13px;font-weight:600;color:#555;display:block;margin-bottom:10px;">Garments *</label>
      <div id="garments-container"></div>
      <button class="add-garment-btn" onclick="addGarmentRow()">+ Add Garment</button>

      <div style="display:flex;gap:12px;">
        <button class="btn btn-primary" onclick="createOrder()">🧾 Create Order</button>
        <button class="btn btn-outline" onclick="clearForm()">Clear</button>
      </div>
    </div>
  </div>

  <!-- ── ORDERS ── -->
  <div id="orders" class="section">
    <div class="card">
      <h2>📋 All Orders</h2>
      <div class="filter-bar">
        <input type="text" id="f-search" placeholder="🔍 Search by name or phone" oninput="loadOrders()"/>
        <select id="f-status" onchange="loadOrders()">
          <option value="">All Statuses</option>
          <option>RECEIVED</option>
          <option>PROCESSING</option>
          <option>READY</option>
          <option>DELIVERED</option>
        </select>
        <input type="text" id="f-garment" placeholder="Filter by garment" oninput="loadOrders()"/>
        <button class="btn btn-primary btn-sm" onclick="loadOrders()">Refresh</button>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>Order ID</th><th>Customer</th><th>Phone</th>
              <th>Garments</th><th>Bill</th><th>Status</th>
              <th>Est. Delivery</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="orders-tbody">
            <tr><td colspan="8" style="text-align:center;color:#999;padding:30px;">No orders yet</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<!-- STATUS UPDATE MODAL -->
<div class="modal-overlay" id="status-modal">
  <div class="modal">
    <h3>Update Order Status</h3>
    <p style="color:#666;font-size:14px;margin-bottom:16px;" id="modal-order-id"></p>
    <div class="form-group">
      <label>New Status</label>
      <select id="modal-status">
        <option>RECEIVED</option>
        <option>PROCESSING</option>
        <option>READY</option>
        <option>DELIVERED</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-success" onclick="confirmStatusUpdate()">Update</button>
    </div>
  </div>
</div>

<script>
const API = "";
let currentOrderId = null;

const GARMENTS = ["Shirt","Pants","Saree","Jacket","Kurta","Suit","Bedsheet","Blanket","Towel"];
const PRICES   = {shirt:50,pants:60,saree:120,jacket:150,kurta:70,suit:200,bedsheet:100,blanket:180,towel:40};

// ── SECTION NAV ────────────────────────────────────────────────────
function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
  if (id === 'dashboard') loadDashboard();
  if (id === 'orders')    loadOrders();
}

// ── DASHBOARD ──────────────────────────────────────────────────────
async function loadDashboard() {
  const res  = await fetch(`${API}/dashboard`);
  const data = await res.json();
  document.getElementById('stat-total').textContent     = data.total_orders;
  document.getElementById('stat-revenue').textContent   = '₹' + data.total_revenue;
  document.getElementById('stat-received').textContent  = data.orders_per_status.RECEIVED;
  document.getElementById('stat-processing').textContent= data.orders_per_status.PROCESSING;
  document.getElementById('stat-ready').textContent     = data.orders_per_status.READY;
  document.getElementById('stat-delivered').textContent = data.orders_per_status.DELIVERED;

  const pl = document.getElementById('price-list');
  pl.innerHTML = Object.entries(data.price_list).map(([k,v]) =>
    `<div class="price-item"><div class="pname">${k}</div><div class="pprice">₹${v}</div></div>`
  ).join('');
}

// ── GARMENT ROWS ───────────────────────────────────────────────────
function addGarmentRow() {
  const container = document.getElementById('garments-container');
  const div = document.createElement('div');
  div.className = 'garment-row';
  div.innerHTML = `
    <select class="g-name" onchange="autoPrice(this)">
      ${GARMENTS.map(g=>`<option value="${g.toLowerCase()}">${g}</option>`).join('')}
      <option value="other">Other</option>
    </select>
    <input type="number" class="g-qty"   value="1" min="1" placeholder="Qty"/>
    <input type="number" class="g-price" value="${PRICES['shirt']}" min="1" placeholder="Price"/>
    <button class="btn btn-danger btn-sm" onclick="this.parentElement.remove()">✕</button>
  `;
  container.appendChild(div);
}

function autoPrice(sel) {
  const row   = sel.parentElement;
  const price = PRICES[sel.value] || 50;
  row.querySelector('.g-price').value = price;
}

function clearForm() {
  document.getElementById('c-name').value  = '';
  document.getElementById('c-phone').value = '';
  document.getElementById('garments-container').innerHTML = '';
  document.getElementById('create-alert').style.display = 'none';
}

// ── CREATE ORDER ───────────────────────────────────────────────────
async function createOrder() {
  const name  = document.getElementById('c-name').value.trim();
  const phone = document.getElementById('c-phone').value.trim();
  const rows  = document.querySelectorAll('.garment-row');

  if (!name || !phone || rows.length === 0) {
    showAlert('create-alert', 'Please fill all fields and add at least one garment.', 'error');
    return;
  }

  const garments = Array.from(rows).map(r => ({
    name:     r.querySelector('.g-name').value,
    quantity: parseInt(r.querySelector('.g-qty').value),
    price:    parseFloat(r.querySelector('.g-price').value),
  }));

  const res  = await fetch(`${API}/orders`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ customer_name: name, phone, garments }),
  });
  const data = await res.json();

  if (res.ok) {
    showAlert('create-alert',
      `✅ Order Created! ID: ${data.order_id} | Bill: ₹${data.total_bill} | Est. Delivery: ${data.estimated_delivery}`,
      'success');
    clearForm();
    loadDashboard();
  } else {
    showAlert('create-alert', '❌ ' + (data.error || 'Something went wrong'), 'error');
  }
}

// ── LOAD ORDERS ────────────────────────────────────────────────────
async function loadOrders() {
  const search  = document.getElementById('f-search').value;
  const status  = document.getElementById('f-status').value;
  const garment = document.getElementById('f-garment').value;

  let url = `${API}/orders?`;
  if (search)  url += `search=${encodeURIComponent(search)}&`;
  if (status)  url += `status=${status}&`;
  if (garment) url += `garment=${encodeURIComponent(garment)}&`;

  const res  = await fetch(url);
  const data = await res.json();
  const tbody = document.getElementById('orders-tbody');

  if (!data.orders.length) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:#999;padding:30px;">No orders found</td></tr>`;
    return;
  }

  tbody.innerHTML = data.orders.map(o => `
    <tr>
      <td><b>${o.order_id}</b></td>
      <td>${o.customer_name}</td>
      <td>${o.phone}</td>
      <td>${o.garments.map(g=>`${g.name}×${g.quantity}`).join(', ')}</td>
      <td><b>₹${o.total_bill}</b></td>
      <td><span class="badge badge-${o.status}">${o.status}</span></td>
      <td>${o.estimated_delivery}</td>
      <td style="display:flex;gap:6px;">
        <button class="btn btn-primary btn-sm" onclick="openModal('${o.order_id}','${o.status}')">✏️ Status</button>
        <button class="btn btn-danger btn-sm"  onclick="deleteOrder('${o.order_id}')">🗑️</button>
      </td>
    </tr>
  `).join('');
}

// ── STATUS MODAL ───────────────────────────────────────────────────
function openModal(orderId, currentStatus) {
  currentOrderId = orderId;
  document.getElementById('modal-order-id').textContent = 'Order: ' + orderId;
  document.getElementById('modal-status').value = currentStatus;
  document.getElementById('status-modal').classList.add('open');
}
function closeModal() {
  document.getElementById('status-modal').classList.remove('open');
}
async function confirmStatusUpdate() {
  const status = document.getElementById('modal-status').value;
  await fetch(`${API}/orders/${currentOrderId}/status`, {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ status }),
  });
  closeModal();
  loadOrders();
  loadDashboard();
}

// ── DELETE ORDER ───────────────────────────────────────────────────
async function deleteOrder(orderId) {
  if (!confirm(`Delete order ${orderId}?`)) return;
  await fetch(`${API}/orders/${orderId}`, { method: 'DELETE' });
  loadOrders();
  loadDashboard();
}

// ── ALERT ──────────────────────────────────────────────────────────
function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = `alert alert-${type}`;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 5000);
}

// ── INIT ───────────────────────────────────────────────────────────
loadDashboard();
addGarmentRow();
</script>
</body>
</html>
